dataset:
  source: FD002
  target: FD003
  data_dir: data/CMAPSS
  processed_dir: data/processed
  window_length: 30
  stride: 1
  rul_cap: 150
  sensors: screened_17

model:
  name: CET-MSA
  input_dim: 17
  hidden_dim: 50
  heads: 8
  tlce_groups: 5
  pyramidal_ratio: 2
  dropout: 0.2

training:
  seed: 0
  epochs: 50
  freeze_tlce_epochs: 5
  batch_size: 100
  eval_batch_size: 64
  lr: 0.0001
  weight_decay: 0.0001
  source_checkpoint: checkpoints/FD002_iteration1_best_score.pth.tar
  output_prefix: FD003_degradation_aware_transfer002
